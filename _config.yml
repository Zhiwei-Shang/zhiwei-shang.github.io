# ---------------------------------------------------------------------------
# Site-wide settings. Edit these once and they propagate across every page.
# ---------------------------------------------------------------------------

title:       "Zhiwei Shang"
description: "Personal website of Zhiwei Shang, PhD Candidate in Management & Strategy."
url:         ""    # e.g. "https://zhiweishang.github.io" (optional, fine to leave blank)
baseurl:     ""    # leave "" if hosting at <username>.github.io

# Author profile — used in the page header and in the footer.
author:
  name:           "Zhiwei Shang"
  name_zh:        "尚志伟"
  role:           "PhD Candidate in Management & Strategy"
  institution:    "The University of Hong Kong"
  email:          "zwshang@connect.hku.hk"
  location:       "Hong Kong"
  photo:          "/images/profile.jpg"
  cv:             ""
  googlescholar:  ""
  github:         ""

updated: "April 2026"

# ---------------------------------------------------------------------------
# Collections — each markdown file in _publications/, _talks/, _teaching/
# becomes one entry on the corresponding page.
# ---------------------------------------------------------------------------
collections:
  publications:
    output: false
  talks:
    output: false
  teaching:
    output: false

defaults:
  - scope: { path: "" }
    values:
      layout: default

# ---------------------------------------------------------------------------
# Build settings
# ---------------------------------------------------------------------------
markdown: kramdown
plugins: []

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - zhiweishang.github.io-master
  - .bundle
  - "*.gem"
