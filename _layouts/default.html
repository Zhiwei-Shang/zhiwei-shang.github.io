<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title and page.nav != 'about' %}{{ page.title }} — {% endif %}{{ site.author.name }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ '/' | relative_url }}" class="site-name">{{ site.author.name }}</a>
      {% include nav.html %}
    </div>
  </header>

  <main class="page">
    <aside class="sidebar">
      {% if site.author.photo %}
        <img src="{{ site.author.photo | relative_url }}" alt="Portrait of {{ site.author.name }}" class="headshot" onerror="this.style.display='none'" />
      {% endif %}
      <h1 class="sidebar-name">{{ site.author.name }}</h1>
      <p class="sidebar-institution">{{ site.author.institution }}</p>
      <ul class="sidebar-meta">
        {% if site.author.location %}
          <li>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <span>{{ site.author.location }}</span>
          </li>
        {% endif %}
        {% if site.author.email %}
          <li>
            <a href="mailto:{{ site.author.email }}">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <span>Email</span>
            </a>
          </li>
        {% endif %}
      </ul>
    </aside>

    <article class="content">
      {{ content }}
    </article>
  </main>


</body>
</html>
